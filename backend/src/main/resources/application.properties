server.port=${PORT:8080}

# ── Database ─────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASS}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.h2.console.enabled=false

# ── Multipart (file upload) ───────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ── Security ─────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:replace-this-with-a-long-random-string-32-plus-chars}
app.jwt.expiration=86400000

# ── CORS ─────────────────────────────────────────────────────
app.cors.origins=${CORS_ORIGINS:http://localhost:5173}

# ── Cloudinary ───────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ── RAG: Jina Embeddings ─────────────────────────────────────
jina.api.key=${JINA_API_KEY}

# ── RAG: Pinecone ────────────────────────────────────────────
pinecone.api.key=${PINECONE_API_KEY}
pinecone.index.host=${PINECONE_INDEX_HOST}
pinecone.top-k=3

# ── RAG: Groq LLM ────────────────────────────────────────────
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# ── Logging ──────────────────────────────────────────────────
logging.level.com.medapp=INFO
